name: Chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: git@github.com:EpitechPGE1-2025/G-DOP-200-STG-2-1-chocolatine-16.git
  EXECUTABLES: mysh

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: github.repository != 'EpitechPGE1-2025/G-DOP-200-STG-2-1-chocolatine-16'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run banana check repository
        run: banana-check-repo

      - name: Build project
        shell: bash
        run: make 2>&1 | tee /tmp/build_output.txt; exit ${PIPESTATUS[0]}
        timeout-minutes: 2
        env:
            CC: epiclang

      - name: Check for banned functions
        shell: bash
        run: |
          BANNED="realloc calloc"
          FAIL=0
          for func in $BANNED; do
            if nm -u mysh 2>/dev/null | grep -q "\b${func}\b"; then
              echo "::error::Banned function used: ${func}"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Display coding style errors as annotations
        run: |
          grep "\[Banana\]" /tmp/build_output.txt | while IFS= read -r line; do
            FILE=$(echo "$line" | cut -d: -f1)
            LINE=$(echo "$line" | cut -d: -f2)
            MSG=$(echo "$line" | cut -d: -f3-)
            echo "::error file=${FILE},line=${LINE}::${MSG}"
          done

      - name: Fail if coding style errors
        run: |
          if grep -q "\[Banana\]" /tmp/build_output.txt; then
            exit 1
          fi

      - name: Clean build artifacts
        run: make clean

      - name: Check executables exist and are executable
        run: |
          FAIL=0
          IFS=','
          for exec in $EXECUTABLES; do
            exec=$(echo "$exec" | xargs)
            if [ ! -f "$exec" ]; then
              echo "::error file=${exec}::Not found: $exec"
              FAIL=1
            elif [ ! -x "$exec" ]; then
              echo "::error file=${exec}::Not executable: $exec"
              FAIL=1
            fi
          done
          exit $FAIL

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    if: github.repository != 'EpitechPGE1-2025/G-DOP-200-STG-2-1-chocolatine-16'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: |
      github.event_name == 'push' &&
      github.repository != 'EpitechPGE1-2025/G-DOP-200-STG-2-1-chocolatine-16'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
