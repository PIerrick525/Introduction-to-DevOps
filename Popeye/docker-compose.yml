services:
  poll:
    build: ./poll
    ports:
      - "5000:80"
    environment:
      REDIS_HOST: redis
    networks:
      - poll-tier
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - poll-tier
      - back-tier
    restart: unless-stopped

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: poll
      POSTGRES_USER: poll
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - back-tier
    restart: unless-stopped
    depends_on:
      - redis
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: poll
      POSTGRES_USER: poll
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - result-tier
      - back-tier
    restart: unless-stopped

  result:
    build: ./result
    ports:
      - "5001:80"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: poll
      POSTGRES_USER: poll
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - result-tier
    restart: unless-stopped
    depends_on:
      - db

networks:
  poll-tier:
  result-tier:
  back-tier:

volumes:
  db-data:
